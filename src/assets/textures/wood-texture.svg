<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!--
    P1-T3b: SVG Wood Texture Filters (UX-R1, UX-R2)
    REQ-001 Phase 1 | 小星 Star Kids

    These filter definitions are globally available for all WoodFrame
    components to reference via filter="url('#wood-grain')" and
    filter="url('#wood-edge')".

    Key design decisions:
    - baseFrequency="0.04 0.2": X low-freq (vertical grain), Y high-freq (fine horizontal texture)
    - feDisplacementMap scale="6": 6px edge irregularity — visible hand-drawn feel without over-distortion
    - Multiple seed values per component instance avoid visual repetition
    - overflow:hidden + border-radius on the CSS container ensures SVG filter respects rounded corners
  -->

  <defs>
    <!--
      wood-grain: Generates the wood texture base
      Uses feTurbulence (fractalNoise) to create organic grain patterns
      mapped through feColorMatrix to wood-toned color values
    -->
    <filter id="wood-grain" x="0%" y="0%" width="100%" height="100%">
      <!-- 1. Generate base noise for wood grain -->
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.04 0.2"
        numOctaves="3"
        seed="2"
        result="noise"
      />

      <!-- 2. Map noise to wood color spectrums -->
      <feColorMatrix
        type="matrix"
        values="
          0.2  0    0     0  0.55
          0    0.1  0     0  0.35
          0    0    0.05  0  0.15
          0    0    0     1  0"
        in="noise"
        result="woodColor"
      />

      <!-- 3. Edge displacement — breaks perfect geometric lines -->
      <feDisplacementMap
        in="woodColor"
        in2="noise"
        scale="6"
        xChannelSelector="R"
        yChannelSelector="G"
        result="texturedWood"
      />

      <!-- 4. Composite with source graphic -->
      <feComposite
        in="texturedWood"
        in2="SourceGraphic"
        operator="in"
        result="finalWood"
      />
    </filter>

    <!--
      wood-edge: Edge roughening filter
      Applies subtle displacement to border elements, breaking the
      "perfect straight line" digital look. Used on ::after pseudo-elements
      that act as inner borders.
    -->
    <filter id="wood-edge" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.08"
        numOctaves="3"
        seed="5"
        result="edgeNoise"
      />

      <feDisplacementMap
        in="SourceGraphic"
        in2="edgeNoise"
        scale="6"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>

    <!--
      wood-grain-alt: Alternative seed variant
      Use this for secondary wood elements (e.g., toolbar base vs camera frame)
      to prevent visible pattern repetition across components.
    -->
    <filter id="wood-grain-alt" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.04 0.2"
        numOctaves="3"
        seed="42"
        result="noise"
      />

      <feColorMatrix
        type="matrix"
        values="
          0.2  0    0     0  0.55
          0    0.1  0     0  0.35
          0    0    0.05  0  0.15
          0    0    0     1  0"
        in="noise"
        result="woodColor"
      />

      <feDisplacementMap
        in="woodColor"
        in2="noise"
        scale="6"
        xChannelSelector="R"
        yChannelSelector="G"
        result="texturedWood"
      />

      <feComposite
        in="texturedWood"
        in2="SourceGraphic"
        operator="in"
        result="finalWood"
      />
    </filter>

    <!--
      wood-edge-alt: Alternative edge seed variant
    -->
    <filter id="wood-edge-alt" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.08"
        numOctaves="3"
        seed="99"
        result="edgeNoise"
      />

      <feDisplacementMap
        in="SourceGraphic"
        in2="edgeNoise"
        scale="6"
        xChannelSelector="R"
        yChannelSelector="G"
      />
    </filter>
  </defs>
</svg>
